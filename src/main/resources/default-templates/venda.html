<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;font-size:10px;color:#1f2937}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.row{display:flex;justify-content:space-between}.k{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af}.v{font-size:11px;font-weight:bold}.panel{border:1px solid #d1d5db;border-radius:10px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:10px}.table th,.table td{padding:7px;border:1px solid #d1d5db}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}.resume{margin-top:12px;display:flex;justify-content:flex-end}.resume table{width:260px;border-collapse:collapse}.resume td{padding:7px;border-bottom:1px solid #d1d5db}.resume .f{background:#111827;color:#fff;font-weight:bold}</style></head><body><header><div class="row"><div><div style="font-size:22px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div th:text="${empresa.cidade + '/' + empresa.uf}">Cidade</div></div><div style="text-align:right"><div class="k" th:text="${isOrcamento ? 'orcamento' : 'pedido'}">pedido</div><div style="font-size:24px;font-weight:800" th:text="${venda.id}">1</div></div></div></header><div class="panel"><div class="row"><div><div class="k">Cliente</div><div class="v" th:text="${nomeCliente}">Cliente</div></div><div><div class="k">Vendedor</div><div class="v" th:text="${nomeVendedor}">Vendedor</div></div><div><div class="k">Status</div><div class="v" th:text="${venda.status}">Status</div></div><div><div class="k">KM do veiculo</div><div class="v" th:text="${kmVeiculoDisplay != null ? kmVeiculoDisplay : (venda.kmVeiculo != null ? venda.kmVeiculo + ' km' : '--')}">0 km</div></div></div></div><div class="panel" th:if="${imprimirObs and venda.observacoes != null and !venda.observacoes.isEmpty()}"><div class="k">Condicoes comerciais</div><div style="margin-top:6px;white-space:pre-wrap" th:text="${venda.observacoes}">Obs</div></div><table class="table"><thead><tr><th>Descricao</th><th>Qtd</th><th>Unitario</th><th>Total</th></tr></thead><tbody><tr th:each="item : ${venda.itens}"><td th:text="${item.produto != null ? item.produto.nome : 'Produto'}">Produto</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoUnitario,1,'POINT',2,'COMMA')}">0,00</td><td th:text="${#numbers.formatDecimal(item.precoUnitario * item.quantidade,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="resume"><table><tr><td>Subtotal</td><td th:text="${venda.valorSubtotal != null ? #numbers.formatDecimal(venda.valorSubtotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr><tr><td>Desconto</td><td th:text="${venda.desconto != null ? #numbers.formatDecimal(venda.desconto,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr><tr class="f"><td>Total</td><td th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></table></div></body></html>
