<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:10px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.panel{border:1px solid #d1d5db;border-radius:10px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:10px}.table th,.table td{padding:7px;border:1px solid #d1d5db}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Espelho de Nota</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${nota.numero}" style="font-size:24px;font-weight:800">12345</div><div th:text="${dataEmissao}">Data</div></div></div></header><div class="panel"><div><strong th:text="${nota.fornecedor}">Fornecedor</strong></div><div style="margin-top:4px" th:text="${nota.status}">Status</div></div><table class="table"><thead><tr><th>Descricao</th><th>UM</th><th>Qtd</th><th>Custo</th></tr></thead><tbody><tr th:each="item : ${itens}"><td th:text="${item.nome}">Item</td><td th:text="${item.unidadeMedida}">UN</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoCusto,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></body></html>
