<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px 16px;border-left:8px solid #ef4444}.band h1{margin:0;font-size:24px}.meta{margin-top:4px;font-size:10px;color:#d1d5db}.panel{border:1px solid #d1d5db;margin-top:12px}.panel h2{margin:0;background:#f3f4f6;padding:8px 10px;font-size:10px;text-transform:uppercase}.panel .body{padding:10px}.cols{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.k{font-size:8px;color:#6b7280;text-transform:uppercase;font-weight:bold}.v{font-size:11px;font-weight:bold;margin-top:3px}.table{width:100%;border-collapse:collapse}.table th,.table td{border:1px solid #e5e7eb;padding:6px}.table th{background:#111827;color:#fff;font-size:8px}.obs{background:#fff7ed;border:1px solid #fdba74;padding:10px}.sum{margin-top:12px;text-align:right;font-size:18px;font-weight:800;color:#b91c1c}</style></head><body><div class="band"><h1 th:text="${numeroOs}">OS</h1><div class="meta" th:text="${empresa.nomeFantasia + ' | ' + empresa.telefone}">Empresa</div></div><div class="panel"><h2>Entrada do veiculo</h2><div class="body cols"><div><div class="k">Cliente</div><div class="v" th:text="${nomeCliente}">Cliente</div></div><div><div class="k">Telefone</div><div class="v" th:text="${telefoneCliente}">Telefone</div></div><div><div class="k">Modelo</div><div class="v" th:text="${veiculoNome}">Veiculo</div></div><div><div class="k">Placa</div><div class="v" th:text="${placaVeiculo}">Placa</div></div><div><div class="k">KM</div><div class="v" th:text="${kmEntradaDisplay != null ? kmEntradaDisplay : (os.kmEntrada != null ? os.kmEntrada + ' km' : '--')}">0 km</div></div></div></div><div class="panel" th:if="${os.observacoes != null and !os.observacoes.isEmpty()}"><h2>Laudo tecnico</h2><div class="body obs" th:text="${os.observacoes}">Observacoes</div></div><div class="panel"><h2>Itens aplicados</h2><div class="body"><table class="table"><thead><tr><th>Descricao</th><th>Qtd</th><th>Valor</th></tr></thead><tbody><tr th:each="item : ${os.itensServicos}"><td th:text="${item.servico != null ? item.servico.nome : 'Servico'}">Servico</td><td th:text="${item.quantidade != null ? item.quantidade : 1}">1</td><td th:text="${item.valorTotal != null ? #numbers.formatDecimal(item.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></tbody></table><div class="sum">TOTAL R$ <span th:text="${os.valorTotal != null ? #numbers.formatDecimal(os.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</span></div></div></div></body></html>
