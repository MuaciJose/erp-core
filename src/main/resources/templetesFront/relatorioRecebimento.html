<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Contas a Receber</title>
    <style>
        @page {
            size: A4 portrait;
            margin: 1.5cm;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #334155;
            margin: 0;
            font-size: 12px;
        }
        .header {
            width: 100%;
            border-bottom: 3px solid #16a34a; /* Verde elegante para Recebimentos */
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header td {
            vertical-align: bottom;
        }
        .company-name {
            font-size: 20px;
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
        }
        .report-title {
            font-size: 14px;
            color: #16a34a;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .emission-date {
            font-size: 10px;
            color: #64748b;
            text-align: right;
        }
        .summary-box {
            background-color: #f0fdf4;
            border-left: 4px solid #16a34a;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .summary-title {
            font-size: 10px;
            color: #15803d;
            text-transform: uppercase;
            font-weight: bold;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 900;
            color: #166534;
        }
        table.data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        table.data-table th {
            background-color: #0f172a;
            color: #ffffff;
            text-align: left;
            padding: 10px 12px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        table.data-table th.text-right {
            text-align: right;
        }
        table.data-table th.text-center {
            text-align: center;
        }
        table.data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 11px;
            vertical-align: middle;
        }
        table.data-table tr:nth-child(even) {
            background-color: #f8fafc;
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-pendente {
            background-color: #fef08a;
            color: #991b1b;
            border: 1px solid #fde047;
        }
        .status-recebido {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .footer {
            text-align: center;
            font-size: 9px;
            color: #94a3b8;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
            padding-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

<table class="header">
    <tr>
        <td width="60%">
            <div class="company-name" th:text="${empresa.nomeFantasia != null ? empresa.nomeFantasia : 'Minha Empresa'}">MINHA EMPRESA</div>
            <div class="report-title" th:text="${tituloRelatorio}">RELATÓRIO DE CONTAS A RECEBER</div>
        </td>
        <td width="40%" class="emission-date">
            Emitido em:<br/>
            <strong th:text="${dataEmissao}">01/01/2026 12:00</strong>
        </td>
    </tr>
</table>

<div class="summary-box">
    <div class="summary-title">Total Geral Listado (R$)</div>
    <div class="summary-value" th:text="${#numbers.formatDecimal(totalGeral, 1, 'POINT', 2, 'COMMA')}">0,00</div>
</div>

<table class="data-table">
    <thead>
    <tr>
        <th width="8%">ID</th>
        <th width="42%">Cliente / Descrição</th>
        <th width="15%" class="text-center">Data</th>
        <th width="15%" class="text-center">Status</th>
        <th width="20%" class="text-right">Valor (R$)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${contas}">
        <td th:text="${c.id}">1</td>
        <td>
            <strong style="color: #0f172a; font-size: 12px;" th:text="${c.fornecedorNome}">Cliente Exemplo</strong><br/>
            <span style="font-size: 10px; color: #64748b;" th:text="${c.descricao}">Venda a prazo</span>
        </td>
        <td class="text-center">
            <strong th:text="${c.dataVencimento}">10/10/2026</strong>
        </td>
        <td class="text-center">
            <span th:class="${c.status == 'RECEBIDO' ? 'status-badge status-recebido' : 'status-badge status-pendente'}" th:text="${c.status}">PENDENTE</span>
        </td>
        <td class="text-right">
            <strong style="font-size: 13px;" th:text="${#numbers.formatDecimal(c.valor, 1, 'POINT', 2, 'COMMA')}">150,00</strong>
        </td>
    </tr>
    </tbody>
</table>

<div class="footer">
    Gerado pelo Sistema ERP - Gestão Financeira Inteligente
</div>

</body>
</html>
