<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório de Comissões</title>

    ```
    <style>
        @page {
            size: A4 portrait;
            margin: 1.2cm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 10px;
            color: #1e293b;
            margin: 0;
        }

        /* HEADER */
        .header {
            border-bottom: 2px solid #0f172a;
            padding-bottom: 8px;
            margin-bottom: 10px;
            text-align: center;
        }

        .titulo {
            font-size: 16px;
            font-weight: bold;
        }

        .subtitulo {
            font-size: 10px;
            color: #059669;
            font-weight: bold;
        }

        .periodo {
            font-size: 9px;
            color: #64748b;
        }

        /* BLOCO */
        .membro-box {
            margin-bottom: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .membro-header {
            background: #f1f5f9;
            padding: 6px 10px;
            border-bottom: 1px solid #cbd5e1;
            font-weight: bold;
        }

        .membro-total {
            float: right;
            color: #059669;
        }

        /* TABELA */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            display: table-header-group;
        }

        th {
            background: #0f172a;
            color: white;
            font-size: 8px;
            padding: 5px;
            text-transform: uppercase;
        }

        td {
            font-size: 9px;
            padding: 5px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr {
            page-break-inside: avoid;
        }

        tr:nth-child(even) {
            background: #f8fafc;
        }

        .text-right { text-align: right; }
        .text-center { text-align: center; }

        /* RESUMO */
        .resumo {
            padding: 8px;
            background: #ecfdf5;
            border-top: 1px solid #059669;
            font-size: 9px;
        }

        /* TOTAIS */
        .totais-gerais {
            margin-top: 20px;
            border-top: 2px solid #0f172a;
            padding-top: 10px;
        }

        .totais-gerais table {
            width: 300px;
            float: right;
        }

        .totais-gerais td {
            padding: 6px;
            font-size: 11px;
        }

        .totais-gerais .label {
            font-weight: bold;
        }

        .totais-gerais .valor {
            text-align: right;
            font-weight: bold;
            color: #047857;
        }

        /* FOOTER */
        .footer {
            margin-top: 30px;
            font-size: 8px;
            text-align: center;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 5px;
        }
    </style>
    ```

</head>

<body>

<!-- HEADER -->

<div class="header">
    <div class="titulo"
         th:text="${empresa != null ? empresa.nomeFantasia : 'EMPRESA'}">
    </div>
    <div class="subtitulo">Relatório de Comissões</div>
    <div class="periodo">
        Período:
        <span th:text="${dataInicio}"></span> até
        <span th:text="${dataFim}"></span>
    </div>
</div>

<!-- SEM DADOS -->

<div th:if="${dados == null or #lists.isEmpty(dados)}"
     style="text-align:center; padding:20px; border:1px dashed #cbd5e1;">
    Nenhum registro encontrado
</div>

<!-- LISTA -->

<div th:each="membro : ${dados}" class="membro-box">

    ```
    <div class="membro-header">
        <span th:text="${membro.nome}">Nome</span>
        <span class="membro-total">
        R$ <span th:text="${membro.totalComissao != null ? #numbers.formatDecimal(membro.totalComissao,1,'POINT',2,'COMMA') : '0.00'}"></span>
    </span>
    </div>

    <table>
        <thead>
        <tr>
            <th>Origem</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th class="text-center">%</th>
            <th class="text-right">Base</th>
            <th class="text-right">Comissão</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="det : ${membro.detalhes}">
            <td th:text="${det.origem}"></td>
            <td th:text="${det.tipoItem}"></td>
            <td th:text="${det.descricao}"></td>
            <td class="text-center"
                th:text="${det.percAplicado != null ? det.percAplicado + '%' : '--'}"></td>
            <td class="text-right"
                th:text="${det.valorBase != null ? #numbers.formatDecimal(det.valorBase,1,'POINT',2,'COMMA') : '0.00'}"></td>
            <td class="text-right" style="color:#059669; font-weight:bold;"
                th:text="${det.valorComissao != null ? #numbers.formatDecimal(det.valorComissao,1,'POINT',2,'COMMA') : '0.00'}"></td>
        </tr>

        <tr th:if="${membro.detalhes == null or #lists.isEmpty(membro.detalhes)}">
            <td colspan="6" class="text-center">Sem dados</td>
        </tr>
        </tbody>
    </table>

    <div class="resumo">
        Base: R$
        <span th:text="${membro.totalBase != null ? #numbers.formatDecimal(membro.totalBase,1,'POINT',2,'COMMA') : '0.00'}"></span>
        |
        Comissão: R$
        <span th:text="${membro.totalComissao != null ? #numbers.formatDecimal(membro.totalComissao,1,'POINT',2,'COMMA') : '0.00'}"></span>
    </div>
    ```

</div>

<!-- TOTAIS -->

<div class="totais-gerais">
    <table>
        <tr>
            <td class="label">Base Geral</td>
            <td class="valor">
                R$ <span th:text="${totalBaseGeral != null ? totalBaseGeral : '0.00'}"></span>
            </td>
        </tr>
        <tr>
            <td class="label">Total Comissões</td>
            <td class="valor">
                R$ <span th:text="${totalComissaoGeral != null ? totalComissaoGeral : '0.00'}"></span>
            </td>
        </tr>
    </table>
</div>

<div style="clear: both;"></div>

<!-- FOOTER -->

<div class="footer">
    Emitido em <span th:text="${dataEmissao}"></span> • Documento interno
</div>

</body>
</html>
