spring:
  application:
    name: erp-core

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/grandport_erp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false # Mostra os comandos SQL no console para debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        tenant_identifier_resolver: com.grandport.erp.config.tenant.TenantResolver
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-migration-naming: true
    clean-disabled: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutos

# ✅ LOGGING ESTRUTURADO COM SLF4J
logging:
  level:
    root: INFO
    com.grandport: INFO
    com.grandport.erp.config.security: INFO
    org.springframework.security: INFO
    br.com.swconsultoria.nfe: INFO
    org.hibernate.SQL: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/erp-core.log
    max-size: 10MB
    max-history: 10

api:
  security:
    token:
      secret: ${JWT_SECRET:}

app:
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}

  jobs:
    fiscal:
      contingencia:
        enabled: ${APP_JOBS_FISCAL_CONTINGENCIA_ENABLED:true}
        fixed-delay: ${APP_JOBS_FISCAL_CONTINGENCIA_FIXED_DELAY:300000}
      sincronizacao:
        enabled: ${APP_JOBS_FISCAL_SINCRONIZACAO_ENABLED:true}
        fixed-delay: ${APP_JOBS_FISCAL_SINCRONIZACAO_FIXED_DELAY:300000}

  api:
    # No seu PC fica o IP da sua rede. No cliente, você vai trocar isso
    # para https://api.site-do-cliente.com.br
    base-url: ${APP_API_BASE_URL:http://192.168.1.104:8080}

# ✅ ACTUATOR PARA MONITORAMENTO E HEALTH CHECK
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches,threaddump
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
