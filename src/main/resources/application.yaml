spring:
  application:
    name: erp-core

  datasource:
    url: jdbc:postgresql://localhost:5432/grandport_erp
    username: postgres # Geralmente 'postgres'
    password: admin # Geralmente 'admin'
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # MUDADO PARA CREATE PARA RECRIAR O BANCO COM A COLUNA TEXT
    show-sql: false # Mostra os comandos SQL no console para debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        tenant_identifier_resolver: com.grandport.erp.config.tenant.TenantResolver # 🚀 MOTOR DO MULTI-EMPRESA (SAAS) ATIVADO AQUI:

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

