spring:
  application:
    name: erp-core
  datasource:
    url: jdbc:postgresql://localhost:5432/grandport_erp
    username: postgres # Geralmente 'postgres'
    password: admin # Geralmente 'admin'
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create # MUDADO PARA CREATE PARA RECRIAR O BANCO COM A COLUNA TEXT
    show-sql: true # Mostra os comandos SQL no console para debug
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
api:
  security:
    token:
      secret: ${JWT_SECRET:minha-chave-secreta-do-erp-123}
