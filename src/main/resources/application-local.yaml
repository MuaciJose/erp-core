logging:
  level:
    com.grandport.erp.config.security: DEBUG
    org.springframework.security: DEBUG
    br.com.swconsultoria.nfe: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

spring:
  jpa:
    show-sql: false

app:
  security:
    cookie:
      secure: false
      same-site: Lax
    cors:
      allowed-origins: http://localhost:5173,http://127.0.0.1:5173
    redis:
      required: false
  jobs:
    fiscal:
      contingencia:
        enabled: true
        fixed-delay: 300000
      sincronizacao:
        enabled: true
        fixed-delay: 300000
