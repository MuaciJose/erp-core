<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Recibo Teste</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; padding: 40px; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px; }
        .cliente-box { background-color: #f8f9fa; padding: 15px; border: 1px solid #ddd; margin-bottom: 20px; }
        .total { font-size: 24px; color: #16a34a; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
<div class="header">
    <h1>Grandport Auto Peças</h1>
    <p>DOCUMENTO OFICIAL (GERADO EM PDF PELO JAVA!)</p>
</div>

<div class="cliente-box">
    <h3>Dados do Cliente:</h3>
    <p>Nome: <strong th:text="${clienteNome}">NOME FAKE</strong></p>
</div>

<h2 class="total">Total da OS: <span th:text="${valorTotal}">R$ 0,00</span></h2>

<div style="margin-top: 100px; text-align: center;">
    <p>_____________________________________</p>
    <p>Assinatura do Mecânico</p>
</div>
</body>
</html>
