version: '3.8'

networks:
  whatsapp_net:
    driver: bridge

services:
  evolution_db:
    image: postgres:15
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=evolution
    ports:
      - "5433:5432"
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - whatsapp_net

  evolution_redis:
    image: redis:alpine
    container_name: evolution_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - evolution_redis_data:/data
    networks:
      - whatsapp_net

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8081:8080"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=MEU_TOKEN_SECRETO_123

      # 🚀 A CHAVE DE OURO: Disfarça a API com a versão mais recente do WhatsApp Web aceita pela Meta
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1032750324

      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:123456@evolution_db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_URL=postgresql://postgres:123456@evolution_db:5432/evolution?schema=public

      - REDIS_URI=redis://evolution_redis:6379/1
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution_redis:6379/2
      - CACHE_REDIS_PREFIX_KEY=evo

      - NODE_OPTIONS=--dns-result-order=ipv4first
      - DEL_MESSAGES=false
      - SET_MESSAGES_AS_SYNCED=false
    depends_on:
      - evolution_db
      - evolution_redis
    networks:
      - whatsapp_net

volumes:
  evolution_db_data:
  evolution_redis_data: