name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Validate Flyway migration naming
      run: |
        invalid_files=$(find src/main/resources/db/migration -maxdepth 1 -type f ! -name 'V*__*.sql')
        if [ -n "$invalid_files" ]; then
          echo "Arquivos de migration fora do padrao:"
          echo "$invalid_files"
          exit 1
        fi

    - name: Validate Hibernate schema policy
      run: |
        if grep -R -nE 'ddl-auto:[[:space:]]*(update|create|create-drop)' src/main/resources/application*.yaml; then
          echo "Configuracao insegura de ddl-auto encontrada."
          exit 1
        fi

    - name: Compile project
      run: ./mvnw -B -DskipTests compile
