name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test
      TEST_DB_URL: jdbc:postgresql://localhost:5432/grandport_erp_test
      TEST_DB_USERNAME: postgres
      TEST_DB_PASSWORD: admin
      JWT_SECRET: ci-jwt-secret-for-tests-only
      RUN_DB_SMOKE_TESTS: true
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: grandport_erp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Validate Flyway migration naming
      run: |
        invalid_files=$(find src/main/resources/db/migration -maxdepth 1 -type f ! -name 'V*__*.sql')
        if [ -n "$invalid_files" ]; then
          echo "Arquivos de migration fora do padrao:"
          echo "$invalid_files"
          exit 1
        fi

    - name: Build with Maven
      run: ./mvnw -B clean package -DskipTests

    - name: Run tests
      run: ./mvnw -B test

    - name: Build Docker image
      if: github.event_name == 'push'
      run: docker build -t erp-core:latest .

    - name: Login to Docker Hub
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag erp-core:latest ${{ secrets.DOCKER_USERNAME }}/erp-core:${{ github.sha }}
        docker tag erp-core:latest ${{ secrets.DOCKER_USERNAME }}/erp-core:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/erp-core:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/erp-core:latest
