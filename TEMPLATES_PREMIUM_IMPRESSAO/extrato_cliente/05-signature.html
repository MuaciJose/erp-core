<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:11px}.frame{border:2px solid #1f2937;padding:16px}.title{font-size:28px;letter-spacing:2px;text-transform:uppercase}.items{width:100%;border-collapse:collapse;margin-top:14px}.items th,.items td{border:1px solid #d1d5db;padding:8px}.items th{background:#f9fafb}</style></head><body><div class="frame"><div class="title">Customer Statement</div><p th:text="${parceiro.nome + ' | ' + parceiro.documento}">Cliente</p><table class="items"><tr><th>Descricao</th><th>Status</th><th>Valor</th></tr><tr th:each="conta : ${contas}"><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></table></div></body></html>
