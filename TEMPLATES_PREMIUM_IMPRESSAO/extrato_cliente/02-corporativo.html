<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:10px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.panel{border:1px solid #d1d5db;border-radius:10px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:10px}.table th,.table td{padding:7px;border:1px solid #d1d5db}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}.resume{margin-top:12px;display:flex;gap:10px}.box{flex:1;border:1px solid #d1d5db;border-radius:10px;padding:12px}.box .t{font-size:8px;text-transform:uppercase;color:#6b7280}.box .v{font-size:18px;font-weight:bold}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Extrato de Cliente</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${parceiro.nome}">Cliente</div><div th:text="${dataEmissao}">Emissao</div></div></div></header><div class="panel"><div><strong th:text="${parceiro.documento}">Documento</strong></div><div th:text="${parceiro.email + ' | ' + parceiro.telefone}">Contato</div></div><table class="table"><thead><tr><th>Conta</th><th>Vencimento</th><th>Status</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="resume"><div class="box"><div class="t">Pendente</div><div class="v" th:text="${#numbers.formatDecimal(totalPendente,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="t">Recebido</div><div class="v" th:text="${#numbers.formatDecimal(totalRecebido,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="t">Total</div><div class="v" th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</div></div></div></body></html>
