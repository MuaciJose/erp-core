<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:10px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{padding:7px;border:1px solid #d1d5db}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}.sum{margin-top:12px;text-align:right;font-size:18px;font-weight:bold}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Contas a Pagar</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div th:text="${dataEmissao}">Data</div></div></header><table class="table"><thead><tr><th>Fornecedor</th><th>Descricao</th><th>Vencimento</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.fornecedorNome}">Fornecedor</td><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="sum">R$ <span th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</span></div></body></html>
