<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:12px}.head{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.badge{background:#0f172a;color:#fff;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:bold}.card{margin-top:18px;border:1px solid #dbe4ee;border-radius:14px;padding:18px;background:#f8fafc}.value{font-size:30px;font-weight:800;margin:14px 0;color:#0f172a}.foot{margin-top:40px;display:flex;justify-content:space-between;color:#64748b}</style></head><body><div class="head"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div style="color:#64748b" th:text="${empresa.cidade + '/' + empresa.uf}">Cidade</div></div><div class="badge">RECIBO</div></div><div class="card"><div>Recebemos de <strong th:text="${dados.pagador}">Pagador</strong> a importancia de</div><div class="value">R$ <span th:text="${#numbers.formatDecimal(dados.valor,1,'POINT',2,'COMMA')}">0,00</span></div><div style="margin-bottom:8px" th:text="${dados.valorExtenso}">valor extenso</div><div>Referente a <strong th:text="${dados.referente}">referente</strong>, <span th:text="${dados.textoFinal}">texto</span></div><div style="margin-top:18px">Emitido em <span th:text="${dataFormatada}">data</span></div></div><div class="foot"><div th:text="${empresa.cnpj}">CNPJ</div><div th:text="${clienteNome}">Cliente</div></div></body></html>
