<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>@page {
        size: A4;
        margin: 15mm
    }

    body {
        font-family: Arial, sans-serif;
        color: #1f2937;
        font-size: 11px
    }

    header {
        background: #111827;
        color: #fff;
        padding: 16px;
        border-radius: 12px
    }

    .kpi {
        display: grid;
        grid-template-columns:repeat(3, 1fr);
        gap: 10px;
        margin-top: 12px
    }

    .box {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px
    }

    .box .t {
        font-size: 8px;
        text-transform: uppercase;
        color: #6b7280
    }

    .box .v {
        font-size: 18px;
        font-weight: bold;
        margin-top: 4px
    }

    .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px
    }

    .table td {
        padding: 8px;
        border-bottom: 1px solid #d1d5db
    }</style>
</head>
<body>
<header>
    <div style="display:flex;justify-content:space-between">
        <div>
            <div style="font-size:24px;font-weight:800">Income Statement</div>
            <div th:text="${empresa.nomeFantasia}">Empresa</div>
        </div>
        <div style="text-align:right">
            <div th:text="${mesExtenso}">Mes</div>
        </div>
    </div>
</header>
<div class="kpi">
    <div class="box">
        <div class="t">Receita liquida</div>
        <div class="v" th:text="${#numbers.formatDecimal(receitaLiquida,1,'POINT',2,'COMMA')}">0,00</div>
    </div>
    <div class="box">
        <div class="t">Lucro bruto</div>
        <div class="v" th:text="${#numbers.formatDecimal(lucroBruto,1,'POINT',2,'COMMA')}">0,00</div>
    </div>
    <div class="box">
        <div class="t">Lucro liquido</div>
        <div class="v" th:text="${#numbers.formatDecimal(lucroLiquido,1,'POINT',2,'COMMA')}">0,00</div>
    </div>
</div>
<table class="table">
    <tr>
        <td>Total despesas</td>
        <td th:text="${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">0,00</td>
    </tr>
    <tr>
        <td>Margem liquida</td>
        <td th:text="${#numbers.formatDecimal(margemLiquida,1,'POINT',2,'COMMA')} + '%'">0%</td>
    </tr>
</table>
</body>
</html>
