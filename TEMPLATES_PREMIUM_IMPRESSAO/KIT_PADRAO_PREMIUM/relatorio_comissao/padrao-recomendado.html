<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:10px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.card{border:1px solid #dbe4ee;border-radius:12px;padding:12px;background:#f8fafc;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:8px}.table th,.table td{border:1px solid #dbe4ee;padding:7px}.table th{background:#0f172a;color:#fff;font-size:8px;text-transform:uppercase}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800">Relatorio de Comissao</div><div style="color:#64748b" th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${dataInicio + ' a ' + dataFim}">Periodo</div><div th:text="${dataEmissao}">Emissao</div></div></div><div class="card" th:each="colab : ${dados}"><div style="display:flex;justify-content:space-between"><strong th:text="${colab.nome}">Colaborador</strong><strong>R$ <span th:text="${#numbers.formatDecimal(colab.totalComissao,1,'POINT',2,'COMMA')}">0,00</span></strong></div><table class="table"><thead><tr><th>Origem</th><th>Descricao</th><th>%</th><th>Base</th><th>Comissao</th></tr></thead><tbody><tr th:each="det : ${colab.detalhes}"><td th:text="${det.origem}">Venda</td><td th:text="${det.descricao}">Descricao</td><td th:text="${#numbers.formatDecimal(det.percAplicado,1,'POINT',2,'COMMA')} + '%'">0%</td><td th:text="${#numbers.formatDecimal(det.valorBase,1,'POINT',2,'COMMA')}">0,00</td><td th:text="${#numbers.formatDecimal(det.valorComissao,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></div></body></html>
