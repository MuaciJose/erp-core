<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #e5e7eb;padding:7px}.table th{background:#111827;color:#fff;font-size:8px}.grand{margin-top:12px;text-align:right;font-size:18px;font-weight:800;color:#166534}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">Contas a Receber</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><table class="table"><thead><tr><th>Cliente</th><th>Status</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.fornecedorNome + ' - ' + conta.descricao}">Cliente</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="grand">R$ <span th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</span></div></body></html>
