<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:10px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #dbe4ee;padding:8px}.table th{background:#0f172a;color:#fff;font-size:8px;text-transform:uppercase}.final{margin-top:12px;text-align:right;font-size:18px;font-weight:800}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800" th:text="${tituloRelatorio}">Relatorio</div><div style="color:#64748b" th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right" th:text="${dataEmissao}">Data</div></div><table class="table"><thead><tr><th>ID</th><th>Cliente</th><th>Descricao</th><th>Vencimento</th><th>Status</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.id}">1</td><td th:text="${conta.fornecedorNome}">Cliente</td><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="final">Total R$ <span th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</span></div></body></html>
