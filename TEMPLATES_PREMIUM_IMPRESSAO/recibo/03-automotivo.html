<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:12px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:16px;border-left:8px solid #ef4444}.ticket{border:1px solid #d1d5db;padding:18px;margin-top:16px}.ticket .money{font-size:36px;font-weight:800;color:#b91c1c}.small{color:#6b7280}.footer{margin-top:42px;display:flex;justify-content:space-between}</style></head><body><div class="band"><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Recibo</div><div class="small" th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div class="small">Emitido em</div><div th:text="${dataFormatada}">Data</div></div></div></div><div class="ticket"><div>Recebemos de <strong th:text="${dados.pagador}">Pagador</strong></div><div class="money">R$ <span th:text="${#numbers.formatDecimal(dados.valor,1,'POINT',2,'COMMA')}">0,00</span></div><div class="small" th:text="${dados.valorExtenso}">Extenso</div><p style="margin-top:14px" th:text="${dados.referente}">Referente</p><p th:text="${dados.textoFinal}">Texto</p></div><div class="footer"><div th:text="${empresa.cnpj}">CNPJ</div><div th:text="${clienteNome}">Cliente</div></div></body></html>
