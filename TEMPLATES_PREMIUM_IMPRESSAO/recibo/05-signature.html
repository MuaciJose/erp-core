<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:13px}.frame{border:2px solid #1f2937;padding:18px}.title{font-size:30px;letter-spacing:2px;text-transform:uppercase}.amount{font-size:38px;font-weight:bold;margin:16px 0}.line{margin-top:50px;border-top:1px solid #1f2937;padding-top:8px;text-align:center;width:280px;margin-left:auto}</style></head><body><div class="frame"><div class="title">Receipt</div><p th:text="${empresa.nomeFantasia}">Empresa</p><p>Recebemos de <strong th:text="${dados.pagador}">Pagador</strong> o valor de</p><div class="amount">R$ <span th:text="${#numbers.formatDecimal(dados.valor,1,'POINT',2,'COMMA')}">0,00</span></div><p th:text="${dados.valorExtenso}">Extenso</p><p th:text="${dados.referente} + '. ' + ${dados.textoFinal}">Texto</p><p th:text="${dataFormatada}">Data</p><div class="line" th:text="${clienteNome}">Cliente</div></div></body></html>
