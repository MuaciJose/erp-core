<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:12px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.box{border:1px solid #d1d5db;border-radius:12px;padding:18px;margin-top:16px}.k{font-size:10px;text-transform:uppercase;color:#6b7280;letter-spacing:1px}.money{font-size:34px;font-weight:800;margin:10px 0}.sign{margin-top:60px;text-align:center;border-top:1px solid #111827;padding-top:8px;width:260px;margin-left:auto}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div th:text="${empresa.telefone}">Telefone</div></div><div style="font-size:18px;font-weight:800">RECIBO</div></div></header><div class="box"><div class="k">Pagador</div><div style="font-size:20px;font-weight:700" th:text="${dados.pagador}">Pagador</div><div class="k" style="margin-top:14px">Valor recebido</div><div class="money">R$ <span th:text="${#numbers.formatDecimal(dados.valor,1,'POINT',2,'COMMA')}">0,00</span></div><div th:text="${dados.valorExtenso}">Extenso</div><div style="margin-top:14px" th:text="${dados.referente} + ' - ' + ${dados.textoFinal}">Referente</div><div style="margin-top:14px" th:text="${dataFormatada}">Data</div></div><div class="sign" th:text="${clienteNome}">Cliente</div></body></html>
