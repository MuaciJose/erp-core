<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:11px}.frame{border:2px solid #1f2937;padding:16px}.title{font-size:28px;letter-spacing:2px;text-transform:uppercase}.items{width:100%;border-collapse:collapse;margin-top:14px}.items th,.items td{border:1px solid #d1d5db;padding:8px}.items th{background:#f9fafb}</style></head><body><div class="frame"><div class="title">Invoice Mirror</div><p th:text="${nota.fornecedor}">Fornecedor</p><p th:text="'NF ' + ${nota.numero} + ' - ' + ${nota.status}">Nota</p><table class="items"><tr><th>Descricao</th><th>Qtd</th><th>Custo</th></tr><tr th:each="item : ${itens}"><td th:text="${item.nome}">Item</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoCusto,1,'POINT',2,'COMMA')}">0,00</td></tr></table></div></body></html>
