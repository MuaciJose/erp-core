<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:10px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.card{border:1px solid #dbe4ee;border-radius:12px;padding:12px;background:#f8fafc;margin-top:14px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #dbe4ee;padding:8px}.table th{background:#0f172a;color:#fff;font-size:8px;text-transform:uppercase}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div style="color:#64748b">Espelho de nota</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800" th:text="${nota.numero}">12345</div><div style="color:#64748b" th:text="${dataEmissao}">Data</div></div></div><div class="card"><strong th:text="${nota.fornecedor}">Fornecedor</strong><div style="margin-top:4px" th:text="'Status: ' + ${nota.status} + ' | Total: R$ ' + ${#numbers.formatDecimal(nota.valorTotal,1,'POINT',2,'COMMA')}">Resumo</div></div><table class="table"><thead><tr><th>Item</th><th>UM</th><th>Qtd</th><th>Custo</th></tr></thead><tbody><tr th:each="item : ${itens}"><td th:text="${item.nome}">Item</td><td th:text="${item.unidadeMedida}">UN</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoCusto,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></body></html>
