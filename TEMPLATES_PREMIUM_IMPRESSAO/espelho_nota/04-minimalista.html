<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e5e7eb}th{text-align:left;font-size:8px;text-transform:uppercase;color:#6b7280}.r{text-align:right}h1{margin:0;font-size:26px}</style></head><body><h1>Espelho de Nota</h1><div th:text="${nota.fornecedor}">Fornecedor</div><div style="margin-top:6px" th:text="'Nota ' + ${nota.numero} + ' | ' + ${nota.status}">Nota</div><table style="margin-top:18px"><tr><th>Item</th><th>UM</th><th>Qtd</th><th class="r">Custo</th></tr><tr th:each="item : ${itens}"><td th:text="${item.nome}">Item</td><td th:text="${item.unidadeMedida}">UN</td><td th:text="${item.quantidade}">1</td><td class="r" th:text="${#numbers.formatDecimal(item.precoCusto,1,'POINT',2,'COMMA')}">0,00</td></tr></table></body></html>
