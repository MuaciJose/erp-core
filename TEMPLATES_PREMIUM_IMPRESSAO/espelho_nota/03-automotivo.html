<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #e5e7eb;padding:7px}.table th{background:#111827;color:#fff;font-size:8px}.highlight{margin-top:12px;border:1px solid #fdba74;background:#fff7ed;padding:10px}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">Espelho de Nota</div><div th:text="${empresa.nomeFantasia} + ' | NF ' + ${nota.numero}">Empresa</div></div><div class="highlight"><strong th:text="${nota.fornecedor}">Fornecedor</strong> - <span th:text="${nota.status}">Status</span> - Total R$ <span th:text="${#numbers.formatDecimal(nota.valorTotal,1,'POINT',2,'COMMA')}">0,00</span></div><table class="table"><thead><tr><th>Item</th><th>Qtd</th><th>Custo</th></tr></thead><tbody><tr th:each="item : ${itens}"><td th:text="${item.nome}">Item</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoCusto,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></body></html>
