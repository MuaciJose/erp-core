<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:10px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.member{border:1px solid #d1d5db;border-radius:10px;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:8px}.table th,.table td{padding:7px;border:1px solid #d1d5db}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Commission Report</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${dataInicio + ' a ' + dataFim}">Periodo</div></div></div></header><div class="member" th:each="colab : ${dados}"><div style="display:flex;justify-content:space-between"><strong th:text="${colab.nome}">Nome</strong><strong th:text="${#numbers.formatDecimal(colab.totalComissao,1,'POINT',2,'COMMA')}">0,00</strong></div><table class="table"><thead><tr><th>Tipo</th><th>Descricao</th><th>Comissao</th></tr></thead><tbody><tr th:each="det : ${colab.detalhes}"><td th:text="${det.tipoItem}">Tipo</td><td th:text="${det.descricao}">Descricao</td><td th:text="${#numbers.formatDecimal(det.valorComissao,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></div></body></html>
