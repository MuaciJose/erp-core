<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.member{border:1px solid #d1d5db;padding:12px;margin-top:12px}.table{width:100%;border-collapse:collapse;margin-top:8px}.table th,.table td{border:1px solid #e5e7eb;padding:7px}.table th{background:#111827;color:#fff;font-size:8px}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">Comissoes</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div class="member" th:each="colab : ${dados}"><div style="display:flex;justify-content:space-between"><strong th:text="${colab.nome}">Nome</strong><strong>R$ <span th:text="${#numbers.formatDecimal(colab.totalComissao,1,'POINT',2,'COMMA')}">0,00</span></strong></div><table class="table"><thead><tr><th>Descricao</th><th>Base</th><th>Comissao</th></tr></thead><tbody><tr th:each="det : ${colab.detalhes}"><td th:text="${det.descricao}">Descricao</td><td th:text="${#numbers.formatDecimal(det.valorBase,1,'POINT',2,'COMMA')}">0,00</td><td th:text="${#numbers.formatDecimal(det.valorComissao,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table></div></body></html>
