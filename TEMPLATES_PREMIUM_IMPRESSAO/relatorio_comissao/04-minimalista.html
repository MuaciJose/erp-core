<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e5e7eb}th{text-align:left;font-size:8px;text-transform:uppercase;color:#6b7280}h1{margin:0;font-size:26px}</style></head><body><h1>Relatorio de Comissao</h1><div th:text="${empresa.nomeFantasia}">Empresa</div><div style="margin-top:14px" th:each="colab : ${dados}"><strong th:text="${colab.nome}">Nome</strong> - R$ <span th:text="${#numbers.formatDecimal(colab.totalComissao,1,'POINT',2,'COMMA')}">0,00</span><table style="margin-top:8px"><tr><th>Descricao</th><th>Comissao</th></tr><tr th:each="det : ${colab.detalhes}"><td th:text="${det.descricao}">Descricao</td><td th:text="${#numbers.formatDecimal(det.valorComissao,1,'POINT',2,'COMMA')}">0,00</td></tr></table></div></body></html>
