<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:12px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.badge{background:#0f172a;color:#fff;padding:6px 12px;border-radius:999px;font-size:11px;font-weight:bold}.card{margin-top:18px;border:1px solid #dbe4ee;border-radius:14px;padding:18px;background:#f8fafc}.money{font-size:30px;font-weight:800;margin:14px 0}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div style="color:#64748b" th:text="${empresa.cnpj}">CNPJ</div></div><div class="badge">PAGAMENTO</div></div><div class="card"><div>Pagamos a <strong th:text="${fornecedorNome}">Fornecedor</strong> o valor de</div><div class="money">R$ <span th:text="${#numbers.formatDecimal(valorConta,1,'POINT',2,'COMMA')}">0,00</span></div><div th:text="${conta.descricao}">Descricao</div><div style="margin-top:18px" th:text="${dataEmissao}">Data</div></div></body></html>
