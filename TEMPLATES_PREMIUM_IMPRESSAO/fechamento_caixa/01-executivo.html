<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:11px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.card{border:1px solid #dbe4ee;border-radius:12px;padding:10px;background:#f8fafc}.k{font-size:8px;text-transform:uppercase;color:#64748b}.v{margin-top:4px;font-size:14px;font-weight:800}.sum{margin-top:14px;border:1px solid #dbe4ee;border-radius:12px;overflow:hidden}.sum div{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #e5e7eb}.sum .f{background:#0f172a;color:#fff;font-weight:bold}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div style="color:#64748b">Fechamento de caixa</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800" th:text="${caixa.id}">77</div><div style="color:#64748b" th:text="${operadorNome}">Operador</div></div></div><div class="cards"><div class="card"><div class="k">Abertura</div><div class="v" th:text="${caixa.dataAbertura}">08:00</div></div><div class="card"><div class="k">Fechamento</div><div class="v" th:text="${caixa.dataFechamento}">18:00</div></div><div class="card"><div class="k">Entradas</div><div class="v" th:text="${#numbers.formatDecimal(totalEntradas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="card"><div class="k">Saidas</div><div class="v" th:text="${#numbers.formatDecimal(totalSaidas,1,'POINT',2,'COMMA')}">0,00</div></div></div><div class="sum"><div><span>Saldo calculado</span><strong th:text="${#numbers.formatDecimal(saldoFinalCalculado,1,'POINT',2,'COMMA')}">0,00</strong></div><div><span>Valor informado</span><strong th:text="${#numbers.formatDecimal(valorInformado,1,'POINT',2,'COMMA')}">0,00</strong></div><div class="f"><span>Diferenca</span><strong th:text="${#numbers.formatDecimal(diferenca,1,'POINT',2,'COMMA')}">0,00</strong></div></div></body></html>
