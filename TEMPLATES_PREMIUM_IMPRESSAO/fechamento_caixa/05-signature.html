<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:11px}.frame{border:2px solid #1f2937;padding:16px}.title{font-size:28px;letter-spacing:2px;text-transform:uppercase}.row{display:flex;justify-content:space-between;margin-top:14px}.box{border:1px solid #d1d5db;padding:12px;flex:1}.money{font-size:18px;font-weight:bold;margin-top:4px}</style></head><body><div class="frame"><div class="title">Cash Closing</div><div th:text="${empresa.nomeFantasia}">Empresa</div><div class="row"><div class="box" style="margin-right:8px">Operador<div class="money" th:text="${operadorNome}">Operador</div></div><div class="box" style="margin-left:8px">Saldo<div class="money" th:text="${#numbers.formatDecimal(saldoFinalCalculado,1,'POINT',2,'COMMA')}">0,00</div></div></div><div class="row"><div class="box" style="margin-right:8px">Informado<div class="money" th:text="${#numbers.formatDecimal(valorInformado,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box" style="margin-left:8px">Diferenca<div class="money" th:text="${#numbers.formatDecimal(diferenca,1,'POINT',2,'COMMA')}">0,00</div></div></div></div></body></html>
