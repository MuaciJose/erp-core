<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;color:#1f2937;font-size:10px}header{background:#111827;color:#fff;padding:16px;border-radius:12px}.row{display:flex;gap:10px;margin-top:12px}.box{flex:1;border:1px solid #d1d5db;border-radius:10px;padding:12px}.k{font-size:8px;text-transform:uppercase;color:#6b7280}.v{font-size:15px;font-weight:bold;margin-top:4px}.resume{margin-top:12px;border:1px solid #111827;border-radius:10px;overflow:hidden}.resume div{display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #d1d5db}.resume .f{background:#111827;color:#fff;font-weight:bold}</style></head><body><header><div style="display:flex;justify-content:space-between"><div><div style="font-size:24px;font-weight:800">Cash Closing</div><div th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${operadorNome}">Operador</div><div th:text="${dataEmissao}">Data</div></div></div></header><div class="row"><div class="box"><div class="k">Entradas</div><div class="v" th:text="${#numbers.formatDecimal(totalEntradas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Saidas</div><div class="v" th:text="${#numbers.formatDecimal(totalSaidas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Saldo</div><div class="v" th:text="${#numbers.formatDecimal(saldoFinalCalculado,1,'POINT',2,'COMMA')}">0,00</div></div></div><div class="resume"><div><span>Valor informado</span><strong th:text="${#numbers.formatDecimal(valorInformado,1,'POINT',2,'COMMA')}">0,00</strong></div><div class="f"><span>Diferenca</span><strong th:text="${#numbers.formatDecimal(diferenca,1,'POINT',2,'COMMA')}">0,00</strong></div></div></body></html>
