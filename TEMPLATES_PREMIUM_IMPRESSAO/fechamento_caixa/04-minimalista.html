<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e5e7eb}th{text-transform:uppercase;font-size:8px;color:#6b7280;text-align:left}.r{text-align:right}h1{margin:0;font-size:26px}</style></head><body><h1>Fechamento de Caixa</h1><div th:text="${empresa.nomeFantasia}">Empresa</div><table style="margin-top:18px"><tr><th>Operador</th><th>Abertura</th><th>Fechamento</th></tr><tr><td th:text="${operadorNome}">Operador</td><td th:text="${caixa.dataAbertura}">08:00</td><td th:text="${caixa.dataFechamento}">18:00</td></tr></table><table style="margin-top:18px"><tr><th>Descricao</th><th class="r">Valor</th></tr><tr><td>Entradas</td><td class="r" th:text="${#numbers.formatDecimal(totalEntradas,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Saidas</td><td class="r" th:text="${#numbers.formatDecimal(totalSaidas,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Saldo calculado</td><td class="r" th:text="${#numbers.formatDecimal(saldoFinalCalculado,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Valor informado</td><td class="r" th:text="${#numbers.formatDecimal(valorInformado,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td><strong>Diferenca</strong></td><td class="r"><strong th:text="${#numbers.formatDecimal(diferenca,1,'POINT',2,'COMMA')}">0,00</strong></td></tr></table></body></html>
