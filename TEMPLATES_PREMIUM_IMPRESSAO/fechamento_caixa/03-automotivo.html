<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.box{border:1px solid #d1d5db;padding:10px}.k{font-size:8px;text-transform:uppercase;color:#6b7280;font-weight:bold}.v{margin-top:4px;font-size:15px;font-weight:800}.grand{margin-top:12px;padding:12px;border:1px solid #fca5a5;background:#fff7ed;text-align:right;font-size:18px;font-weight:800;color:#b91c1c}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">Fechamento de Caixa</div><div th:text="${empresa.nomeFantasia + ' | Operador: ' + operadorNome}">Empresa</div></div><div class="grid"><div class="box"><div class="k">Entradas</div><div class="v" th:text="${#numbers.formatDecimal(totalEntradas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Saidas</div><div class="v" th:text="${#numbers.formatDecimal(totalSaidas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Saldo calculado</div><div class="v" th:text="${#numbers.formatDecimal(saldoFinalCalculado,1,'POINT',2,'COMMA')}">0,00</div></div></div><div class="grand">Diferenca R$ <span th:text="${#numbers.formatDecimal(diferenca,1,'POINT',2,'COMMA')}">0,00</span></div></body></html>
