<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}td,th{padding:8px;border-bottom:1px solid #e5e7eb}th{text-align:left;text-transform:uppercase;font-size:8px;color:#6b7280}h1{font-size:26px;margin:0}small{color:#6b7280}.right{text-align:right}.total{font-size:16px;font-weight:bold}</style></head><body><table><tr><td><h1>Ordem de Servico</h1><small th:text="${empresa.nomeFantasia}">Empresa</small></td><td class="right"><h1 th:text="${numeroOs}">OS</h1><small th:text="${placaVeiculo}">Placa</small></td></tr></table><table style="margin-top:18px"><tr><th>Cliente</th><th>Veiculo</th><th>Consultor</th><th>KM</th></tr><tr><td th:text="${nomeCliente}">Cliente</td><td th:text="${veiculoNome}">Veiculo</td><td th:text="${nomeConsultor}">Consultor</td><td th:text="${kmEntradaDisplay != null ? kmEntradaDisplay : (os.kmEntrada != null ? os.kmEntrada + ' km' : '--')}">0 km</td></tr></table><div style="margin-top:18px" th:if="${os.observacoes != null and !os.observacoes.isEmpty()}"><small>Observacoes</small><div th:text="${os.observacoes}" style="margin-top:6px;white-space:pre-wrap">Obs</div></div><table style="margin-top:18px"><tr><th>Servico</th><th>Qtd</th><th class="right">Total</th></tr><tr th:each="item : ${os.itensServicos}"><td th:text="${item.servico != null ? item.servico.nome : 'Servico'}">Servico</td><td th:text="${item.quantidade != null ? item.quantidade : 1}">1</td><td class="right" th:text="${item.valorTotal != null ? #numbers.formatDecimal(item.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></table><table style="margin-top:18px"><tr><td class="right total">Total geral</td><td class="right total" style="width:180px" th:text="${os.valorTotal != null ? #numbers.formatDecimal(os.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></table></body></html>
