<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:11px}.head{border:2px solid #1f2937;padding:14px}.title{font-size:28px;letter-spacing:2px;text-transform:uppercase}.sub{margin-top:4px;color:#6b7280}.block{margin-top:14px;border:1px solid #d1d5db;padding:12px}.block h2{margin:0 0 8px 0;font-size:12px;text-transform:uppercase}.items{width:100%;border-collapse:collapse}.items td,.items th{padding:8px;border:1px solid #d1d5db}.items th{background:#f9fafb}.grand{margin-top:14px;text-align:right;font-size:20px;font-weight:bold}.sig{margin-top:60px;display:flex;gap:30px}.sig div{flex:1;text-align:center;border-top:1px solid #1f2937;padding-top:6px}</style></head><body><div class="head"><div style="display:flex;justify-content:space-between;align-items:end"><div><div class="title">Service Order</div><div class="sub" th:text="${empresa.nomeFantasia} + ' - ' + ${empresa.cidade} + '/' + ${empresa.uf}">Empresa</div></div><div style="text-align:right"><div th:text="${numeroOs}" style="font-size:24px;font-weight:bold">OS</div><div class="sub" th:text="${placaVeiculo}">Placa</div></div></div></div><div class="block"><h2>Identificacao</h2><div><strong th:text="${nomeCliente}">Cliente</strong> - <span th:text="${telefoneCliente}">Telefone</span></div><div style="margin-top:4px" th:text="${veiculoNome} + ' | Consultor: ' + ${nomeConsultor} + ' | KM: ' + (kmEntradaDisplay != null ? kmEntradaDisplay : (os.kmEntrada != null ? os.kmEntrada + ' km' : '--'))">Veiculo</div></div><div class="block"><h2>Escopo</h2><div th:text="${os.defeitoRelatado != null ? os.defeitoRelatado : os.observacoes}">Escopo</div></div><table class="items"><tr><th>Descricao</th><th>Qtd</th><th>Total</th></tr><tr th:each="item : ${os.itensServicos}"><td th:text="${item.servico != null ? item.servico.nome : 'Servico'}">Servico</td><td th:text="${item.quantidade != null ? item.quantidade : 1}">1</td><td th:text="${item.valorTotal != null ? #numbers.formatDecimal(item.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></table><div class="grand">R$ <span th:text="${os.valorTotal != null ? #numbers.formatDecimal(os.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</span></div><div class="sig"><div>Responsavel tecnico</div><div>Cliente</div></div></body></html>
