<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Arial,sans-serif;font-size:10px;color:#1f2937}header{background:#111827;color:#fff;padding:16px;border-radius:14px}section{margin-top:14px}.card{border:1px solid #e5e7eb;border-radius:12px;padding:12px}.row{display:flex;gap:12px}.cell{flex:1}.label{font-size:8px;text-transform:uppercase;color:#6b7280;font-weight:bold}.value{font-size:11px;font-weight:bold}.table{width:100%;border-collapse:collapse;margin-top:8px}.table th,.table td{border:1px solid #d1d5db;padding:7px}.table th{background:#f3f4f6;text-transform:uppercase;font-size:8px}.foot{margin-top:16px;display:flex;justify-content:flex-end}.box{width:260px;border:1px solid #111827;border-radius:10px;overflow:hidden}.box div{display:flex;justify-content:space-between;padding:8px 10px}.box .final{background:#111827;color:#fff;font-weight:bold}</style></head><body><header><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:22px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div th:text="${empresa.logradouro} + ', ' + ${empresa.numero} + ' - ' + ${empresa.cidade} + '/' + ${empresa.uf}">Endereco</div></div><div style="text-align:right"><div style="font-size:10px;letter-spacing:1px">SERVICE ORDER</div><div style="font-size:24px;font-weight:800" th:text="${numeroOs}">OS</div></div></div></header><section class="card"><div class="row"><div class="cell"><div class="label">Cliente</div><div class="value" th:text="${nomeCliente}">Cliente</div></div><div class="cell"><div class="label">Consultor</div><div class="value" th:text="${nomeConsultor}">Consultor</div></div><div class="cell"><div class="label">Veiculo</div><div class="value" th:text="${veiculoNome}">Veiculo</div></div><div class="cell"><div class="label">Placa</div><div class="value" th:text="${placaVeiculo}">Placa</div></div><div class="cell"><div class="label">KM</div><div class="value" th:text="${kmEntradaDisplay != null ? kmEntradaDisplay : (os.kmEntrada != null ? os.kmEntrada + ' km' : '--')}">0 km</div></div></div></section><section class="card" th:if="${os.defeitoRelatado != null and !os.defeitoRelatado.isEmpty()}"><div class="label">Relato de entrada</div><div th:text="${os.defeitoRelatado}" style="margin-top:6px;white-space:pre-wrap">Defeito</div></section><section><table class="table"><thead><tr><th>Item</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead><tbody><tr th:each="item : ${os.itensServicos}"><td th:text="${item.servico != null ? item.servico.nome : 'Servico'}">Servico</td><td th:text="${item.quantidade != null ? item.quantidade : 1}">1</td><td th:text="${item.precoUnitario != null ? #numbers.formatDecimal(item.precoUnitario,1,'POINT',2,'COMMA') : '0,00'}">0,00</td><td th:text="${item.valorTotal != null ? #numbers.formatDecimal(item.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></tbody></table></section><div class="foot"><div class="box"><div><span>Servicos</span><strong th:text="${os.totalServicos != null ? #numbers.formatDecimal(os.totalServicos,1,'POINT',2,'COMMA') : '0,00'}">0,00</strong></div><div><span>Pecas</span><strong th:text="${os.totalPecas != null ? #numbers.formatDecimal(os.totalPecas,1,'POINT',2,'COMMA') : '0,00'}">0,00</strong></div><div class="final"><span>Total</span><strong th:text="${os.valorTotal != null ? #numbers.formatDecimal(os.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</strong></div></div></div></body></html>
