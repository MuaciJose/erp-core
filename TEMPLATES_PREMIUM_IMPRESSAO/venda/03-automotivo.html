<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;font-size:10px;color:#111827}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.band .small{color:#d1d5db;font-size:9px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.box{border:1px solid #d1d5db;padding:10px}.k{font-size:8px;text-transform:uppercase;color:#6b7280;font-weight:bold}.v{margin-top:4px;font-size:11px;font-weight:bold}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #e5e7eb;padding:7px}.table th{background:#111827;color:#fff;font-size:8px}.grand{margin-top:12px;text-align:right;font-size:18px;font-weight:800;color:#b91c1c}</style></head><body><div class="band"><div style="display:flex;justify-content:space-between"><div><div style="font-size:23px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div class="small" th:text="${nomeVendedor}">Vendedor</div></div><div style="text-align:right"><div class="small" th:text="${isOrcamento ? 'ORCAMENTO' : 'VENDA'}">Venda</div><div style="font-size:24px;font-weight:800" th:text="${venda.id}">1</div></div></div></div><div class="grid"><div class="box"><div class="k">Cliente</div><div class="v" th:text="${nomeCliente}">Cliente</div></div><div class="box"><div class="k">Status</div><div class="v" th:text="${venda.status}">Status</div></div><div class="box"><div class="k">KM do veiculo</div><div class="v" th:text="${kmVeiculoDisplay != null ? kmVeiculoDisplay : (venda.kmVeiculo != null ? venda.kmVeiculo + ' km' : '--')}">0 km</div></div><div class="box"><div class="k">Total previsto</div><div class="v" th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</div></div></div><table class="table"><thead><tr><th>Item</th><th>Qtd</th><th>Total</th></tr></thead><tbody><tr th:each="item : ${venda.itens}"><td th:text="${item.produto != null ? item.produto.nome : 'Produto'}">Produto</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoUnitario * item.quantidade,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="grand">R$ <span th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</span></div></body></html>
