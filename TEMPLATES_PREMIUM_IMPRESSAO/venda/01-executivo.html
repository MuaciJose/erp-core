<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>@page {
        size: A4;
        margin: 16mm
    }

    body {
        font-family: Helvetica, Arial, sans-serif;
        color: #172033;
        font-size: 10px
    }

    .top {
        display: flex;
        justify-content: space-between;
        border-bottom: 3px solid #0f172a;
        padding-bottom: 12px
    }

    .muted {
        color: #64748b
    }

    .card {
        border: 1px solid #dbe4ee;
        border-radius: 12px;
        padding: 12px;
        margin-top: 14px;
        background: #f8fafc
    }

    .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px
    }

    .table th, .table td {
        border: 1px solid #dbe4ee;
        padding: 8px
    }

    .table th {
        background: #0f172a;
        color: #fff;
        font-size: 8px;
        text-transform: uppercase
    }

    .tot {
        margin-left: auto;
        margin-top: 12px;
        width: 280px;
        border-collapse: collapse
    }

    .tot td {
        padding: 8px;
        border-bottom: 1px solid #dbe4ee
    }

    .final {
        background: #0f172a;
        color: #fff;
        font-weight: bold
    }</style>
</head>
<body>
<div class="top">
    <div>
        <div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div>
        <div class="muted" th:text="${empresa.cnpj + ' | ' + empresa.telefone}">CNPJ</div>
    </div>
    <div style="text-align:right">
        <div class="muted" th:text="${isOrcamento ? 'ORCAMENTO' : 'PEDIDO DE VENDA'}">Venda</div>
        <div style="font-size:22px;font-weight:800" th:text="${venda.id}">1</div>
        <div class="muted" th:text="${nomeVendedor}">Vendedor</div>
    </div>
</div>
<div class="card"><strong th:text="${nomeCliente}">Cliente</strong>
    <div class="muted" th:text="${venda.status}">Status</div>
    <div class="muted" th:text="'KM do veiculo: ' + (${kmVeiculoDisplay != null ? kmVeiculoDisplay : (venda.kmVeiculo != null ? venda.kmVeiculo + ' km' : '--')})">KM</div>
    <div th:if="${venda.observacoes != null and imprimirObs}" style="margin-top:8px;white-space:pre-wrap"
         th:text="${venda.observacoes}">Observacoes
    </div>
</div>
<table class="table">
    <thead>
    <tr>
        <th>Produto</th>
        <th>Qtd</th>
        <th>Unit.</th>
        <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${venda.itens}">
        <td th:text="${item.produto != null ? item.produto.nome : 'Produto'}">Produto</td>
        <td th:text="${item.quantidade}">1</td>
        <td th:text="${#numbers.formatDecimal(item.precoUnitario,1,'POINT',2,'COMMA')}">0,00</td>
        <td th:text="${#numbers.formatDecimal(item.precoUnitario * item.quantidade,1,'POINT',2,'COMMA')}">0,00</td>
    </tr>
    </tbody>
</table>
<table class="tot">
    <tr>
        <td>Subtotal</td>
        <td th:text="${venda.valorSubtotal != null ? #numbers.formatDecimal(venda.valorSubtotal,1,'POINT',2,'COMMA') : '0,00'}">
            0,00
        </td>
    </tr>
    <tr>
        <td>Desconto</td>
        <td th:text="${venda.desconto != null ? #numbers.formatDecimal(venda.desconto,1,'POINT',2,'COMMA') : '0,00'}">
            0,00
        </td>
    </tr>
    <tr class="final">
        <td>Total</td>
        <td th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">
            0,00
        </td>
    </tr>
</table>
</body>
</html>
