<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e5e7eb}th{text-align:left;font-size:8px;text-transform:uppercase;color:#6b7280}.r{text-align:right}h1{margin:0;font-size:26px}</style></head><body><table><tr><td><h1 th:text="${isOrcamento ? 'Orcamento' : 'Pedido de Venda'}">Venda</h1><div th:text="${empresa.nomeFantasia}">Empresa</div></td><td class="r"><h1 th:text="${venda.id}">1</h1><div th:text="${nomeVendedor}">Vendedor</div></td></tr></table><table style="margin-top:16px"><tr><th>Cliente</th><th>Status</th><th>KM</th><th class="r">Total</th></tr><tr><td th:text="${nomeCliente}">Cliente</td><td th:text="${venda.status}">Status</td><td th:text="${kmVeiculoDisplay != null ? kmVeiculoDisplay : (venda.kmVeiculo != null ? venda.kmVeiculo + ' km' : '--')}">0 km</td><td class="r" th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</td></tr></table><table style="margin-top:16px"><tr><th>Produto</th><th>Qtd</th><th class="r">Unitario</th><th class="r">Total</th></tr><tr th:each="item : ${venda.itens}"><td th:text="${item.produto != null ? item.produto.nome : 'Produto'}">Produto</td><td th:text="${item.quantidade}">1</td><td class="r" th:text="${#numbers.formatDecimal(item.precoUnitario,1,'POINT',2,'COMMA')}">0,00</td><td class="r" th:text="${#numbers.formatDecimal(item.precoUnitario * item.quantidade,1,'POINT',2,'COMMA')}">0,00</td></tr></table></body></html>
