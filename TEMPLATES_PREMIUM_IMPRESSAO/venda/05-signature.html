<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:11px}.head{border:2px solid #1f2937;padding:14px}.title{font-size:28px;text-transform:uppercase;letter-spacing:2px}.sub{color:#6b7280}.block{margin-top:14px;border:1px solid #d1d5db;padding:12px}.items{width:100%;border-collapse:collapse;margin-top:14px}.items th,.items td{border:1px solid #d1d5db;padding:8px}.items th{background:#f9fafb}.grand{margin-top:14px;text-align:right;font-size:20px;font-weight:bold}.sig{margin-top:50px;text-align:center;border-top:1px solid #1f2937;padding-top:6px;width:260px;margin-left:auto}</style></head><body><div class="head"><div style="display:flex;justify-content:space-between;align-items:end"><div><div class="title" th:text="${isOrcamento ? 'Quotation' : 'Sales Order'}">Sales</div><div class="sub" th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div th:text="${venda.id}" style="font-size:24px;font-weight:bold">1</div><div class="sub" th:text="${nomeVendedor}">Vendedor</div></div></div></div><div class="block"><strong th:text="${nomeCliente}">Cliente</strong><div style="margin-top:4px" th:text="${venda.status}">Status</div><div style="margin-top:4px" th:text="'KM do veiculo: ' + (${kmVeiculoDisplay != null ? kmVeiculoDisplay : (venda.kmVeiculo != null ? venda.kmVeiculo + ' km' : '--')})">KM</div><div th:if="${imprimirObs and venda.observacoes != null}" style="margin-top:8px;white-space:pre-wrap" th:text="${venda.observacoes}">Obs</div></div><table class="items"><tr><th>Descricao</th><th>Qtd</th><th>Total</th></tr><tr th:each="item : ${venda.itens}"><td th:text="${item.produto != null ? item.produto.nome : 'Produto'}">Produto</td><td th:text="${item.quantidade}">1</td><td th:text="${#numbers.formatDecimal(item.precoUnitario * item.quantidade,1,'POINT',2,'COMMA')}">0,00</td></tr></table><div class="grand">R$ <span th:text="${venda.valorTotal != null ? #numbers.formatDecimal(venda.valorTotal,1,'POINT',2,'COMMA') : '0,00'}">0,00</span></div><div class="sig">Assinatura do cliente</div></body></html>
