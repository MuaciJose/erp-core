<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:10px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.card{border:1px solid #dbe4ee;border-radius:12px;padding:12px;background:#f8fafc;margin-top:14px}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #dbe4ee;padding:8px}.table th{background:#0f172a;color:#fff;font-size:8px;text-transform:uppercase}.total{margin-top:12px;display:flex;justify-content:flex-end;gap:16px;font-weight:bold}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800" th:text="${empresa.nomeFantasia}">Empresa</div><div style="color:#64748b">Extrato de fornecedor</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:800" th:text="${parceiro.nome}">Fornecedor</div><div style="color:#64748b" th:text="${dataInicio + ' a ' + dataFim}">Periodo</div></div></div><div class="card"><strong th:text="${parceiro.nome}">Fornecedor</strong><div style="margin-top:4px" th:text="${parceiro.documento} + ' | ' + ${parceiro.telefone}">Documento</div><div th:text="${parceiro.email}">Email</div></div><table class="table"><thead><tr><th>ID</th><th>Descricao</th><th>Vencimento</th><th>Status</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.id}">1</td><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="total"><span>Pendente R$ <strong th:text="${#numbers.formatDecimal(totalPendente,1,'POINT',2,'COMMA')}">0,00</strong></span><span>Pago R$ <strong th:text="${#numbers.formatDecimal(totalPago,1,'POINT',2,'COMMA')}">0,00</strong></span><span>Total R$ <strong th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</strong></span></div></body></html>
