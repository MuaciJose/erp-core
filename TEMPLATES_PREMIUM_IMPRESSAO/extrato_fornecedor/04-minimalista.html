<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #e5e7eb}th{text-align:left;font-size:8px;text-transform:uppercase;color:#6b7280}.r{text-align:right}h1{margin:0;font-size:26px}</style></head><body><h1>Extrato de Fornecedor</h1><div th:text="${parceiro.nome}">Fornecedor</div><table style="margin-top:18px"><tr><th>Descricao</th><th>Vencimento</th><th>Status</th><th class="r">Valor</th></tr><tr th:each="conta : ${contas}"><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${conta.status}">Status</td><td class="r" th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></table><table style="margin-top:18px"><tr><td>Pendente</td><td class="r" th:text="${#numbers.formatDecimal(totalPendente,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Pago</td><td class="r" th:text="${#numbers.formatDecimal(totalPago,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td><strong>Total</strong></td><td class="r"><strong th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</strong></td></tr></table></body></html>
