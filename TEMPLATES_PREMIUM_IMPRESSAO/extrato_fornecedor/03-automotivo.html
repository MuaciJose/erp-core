<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:10px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.table{width:100%;border-collapse:collapse;margin-top:12px}.table th,.table td{border:1px solid #e5e7eb;padding:7px}.table th{background:#111827;color:#fff;font-size:8px}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.kpi{border:1px solid #d1d5db;padding:10px}.kpi .k{font-size:8px;text-transform:uppercase;color:#6b7280}.kpi .v{font-size:18px;font-weight:800;margin-top:4px}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">Extrato Fornecedor</div><div th:text="|${parceiro.nome} | ${dataInicio} a ${dataFim}|">Periodo</div></div><table class="table"><thead><tr><th>Descricao</th><th>Venc.</th><th>Status</th><th>Valor</th></tr></thead><tbody><tr th:each="conta : ${contas}"><td th:text="${conta.descricao}">Descricao</td><td th:text="${conta.dataVencimento}">Data</td><td th:text="${conta.status}">Status</td><td th:text="${#numbers.formatDecimal(conta.valor,1,'POINT',2,'COMMA')}">0,00</td></tr></tbody></table><div class="kpis"><div class="kpi"><div class="k">Pendente</div><div class="v" th:text="${#numbers.formatDecimal(totalPendente,1,'POINT',2,'COMMA')}">0,00</div></div><div class="kpi"><div class="k">Pago</div><div class="v" th:text="${#numbers.formatDecimal(totalPago,1,'POINT',2,'COMMA')}">0,00</div></div><div class="kpi"><div class="k">Total</div><div class="v" th:text="${#numbers.formatDecimal(totalGeral,1,'POINT',2,'COMMA')}">0,00</div></div></div></body></html>
