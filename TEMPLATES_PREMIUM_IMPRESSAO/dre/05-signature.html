<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:15mm}body{font-family:Georgia,'Times New Roman',serif;color:#1f2937;font-size:12px}.frame{border:2px solid #1f2937;padding:16px}.title{font-size:30px;letter-spacing:2px;text-transform:uppercase}.row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #d1d5db}</style></head><body><div class="frame"><div class="title">DRE</div><p th:text="${empresa.nomeFantasia + ' | ' + mesExtenso}">Empresa</p><div class="row"><span>Receita liquida</span><strong th:text="${#numbers.formatDecimal(receitaLiquida,1,'POINT',2,'COMMA')}">0,00</strong></div><div class="row"><span>Lucro bruto</span><strong th:text="${#numbers.formatDecimal(lucroBruto,1,'POINT',2,'COMMA')}">0,00</strong></div><div class="row"><span>Despesas</span><strong th:text="${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">0,00</strong></div><div class="row"><span>Lucro liquido</span><strong th:text="${#numbers.formatDecimal(lucroLiquido,1,'POINT',2,'COMMA')}">0,00</strong></div></div></body></html>
