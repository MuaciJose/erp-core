<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:16mm}body{font-family:Helvetica,Arial,sans-serif;color:#172033;font-size:11px}.top{display:flex;justify-content:space-between;border-bottom:3px solid #0f172a;padding-bottom:12px}.table{width:100%;border-collapse:collapse;margin-top:14px}.table td,.table th{border:1px solid #dbe4ee;padding:9px}.table th{background:#0f172a;color:#fff;text-transform:uppercase;font-size:8px}.good{color:#166534;font-weight:bold}.bad{color:#991b1b;font-weight:bold}</style></head><body><div class="top"><div><div style="font-size:24px;font-weight:800">DRE</div><div style="color:#64748b" th:text="${empresa.nomeFantasia}">Empresa</div></div><div style="text-align:right"><div style="font-size:20px;font-weight:800" th:text="${mesExtenso}">Mes</div><div style="color:#64748b" th:text="${dataEmissao}">Data</div></div></div><table class="table"><tr><th>Indicador</th><th>Valor</th></tr><tr><td>Receita liquida</td><td th:text="${#numbers.formatDecimal(receitaLiquida,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Lucro bruto</td><td th:text="${#numbers.formatDecimal(lucroBruto,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Total despesas</td><td class="bad" th:text="${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Lucro liquido</td><td class="good" th:text="${#numbers.formatDecimal(lucroLiquido,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Margem liquida</td><td th:text="${#numbers.formatDecimal(margemLiquida,1,'POINT',2,'COMMA')} + '%'">0%</td></tr></table></body></html>
