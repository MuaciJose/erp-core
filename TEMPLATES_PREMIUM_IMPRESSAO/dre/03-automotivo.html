<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:14mm}body{font-family:Helvetica,Arial,sans-serif;color:#111827;font-size:11px}.band{background:linear-gradient(90deg,#111827,#374151);color:#fff;padding:14px;border-left:8px solid #ef4444}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.box{border:1px solid #d1d5db;padding:12px}.k{font-size:8px;text-transform:uppercase;color:#6b7280;font-weight:bold}.v{margin-top:4px;font-size:18px;font-weight:800}.good{color:#166534}.bad{color:#b91c1c}</style></head><body><div class="band"><div style="font-size:24px;font-weight:800">DRE Gerencial</div><div th:text="${empresa.nomeFantasia + ' | ' + mesExtenso}">Empresa</div></div><div class="grid"><div class="box"><div class="k">Receita liquida</div><div class="v" th:text="${#numbers.formatDecimal(receitaLiquida,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Lucro bruto</div><div class="v" th:text="${#numbers.formatDecimal(lucroBruto,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Despesas</div><div class="v bad" th:text="${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">0,00</div></div><div class="box"><div class="k">Lucro liquido</div><div class="v good" th:text="${#numbers.formatDecimal(lucroLiquido,1,'POINT',2,'COMMA')}">0,00</div></div></div></body></html>
