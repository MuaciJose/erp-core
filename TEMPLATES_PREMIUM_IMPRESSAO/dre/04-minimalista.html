<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"/><style>@page{size:A4;margin:18mm}body{font-family:Arial,sans-serif;color:#222;font-size:11px}table{width:100%;border-collapse:collapse}td{padding:10px;border-bottom:1px solid #e5e7eb}h1{margin:0 0 4px 0;font-size:28px}.r{text-align:right}</style></head><body><h1>DRE</h1><div th:text="${empresa.nomeFantasia + ' - ' + mesExtenso}">Empresa</div><table style="margin-top:18px"><tr><td>Receita liquida</td><td class="r" th:text="${#numbers.formatDecimal(receitaLiquida,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Lucro bruto</td><td class="r" th:text="${#numbers.formatDecimal(lucroBruto,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td>Total despesas</td><td class="r" th:text="${#numbers.formatDecimal(totalDespesas,1,'POINT',2,'COMMA')}">0,00</td></tr><tr><td><strong>Lucro liquido</strong></td><td class="r"><strong th:text="${#numbers.formatDecimal(lucroLiquido,1,'POINT',2,'COMMA')}">0,00</strong></td></tr></table></body></html>
